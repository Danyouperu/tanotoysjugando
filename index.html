<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aprende Jugando</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#EAF2F8;
  --card:#FFFFFF;
  --primary:#5F7D95;
  --text:#44515C;
  --muted:#6B7C88;
  --border:#E8DDCF;
  --shadow:0 6px 18px rgba(68,81,92,.08);
  --active-text:#FFFFFF;
  --soft:#F3E9D2;
}

body.dark{
  --bg:#263B5A;
  --card:#4D6785;
  --primary:#F3E9D2;
  --text:#FAFAF7;
  --muted:#F3E9D2;
  --border:#607A95;
  --shadow:0 8px 20px rgba(0,0,0,.18);
  --active-text:#263B5A;
  --soft:#F3E9D2;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}

html,
body{
  min-height:100vh;
  overflow-x:hidden;
  background:var(--bg);
  font-family:'Nunito',sans-serif;
  color:var(--text);
}

body{
  padding:0 14px 20px;
  transition:background .25s ease,color .25s ease;
  -webkit-tap-highlight-color:transparent;
}

.header{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px 0 10px;
}

.header h1{
  font-size:clamp(20px,4.7vw,28px);
  color:var(--primary);
  font-weight:800;
  letter-spacing:.2px;
}

.theme-btn{
  position:absolute;
  right:0;
  top:8px;
  border:none;
  background:none;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
  padding:4px 6px;
  color:var(--primary);
}

.theme-btn .star{
  font-size:33px;
  line-height:1;
  opacity:.92;
  transform:translateY(1px);
}

.theme-btn .label{
  font-size:8px;
  line-height:1;
  font-weight:800;
  letter-spacing:.2px;
  opacity:.95;
}

.tabs{
  display:flex;
  gap:28px;
  justify-content:center;
  margin-bottom:28px;
  flex-wrap:wrap;
}

.tab-btn{
  min-width:86px;
  min-height:86px;
  padding:10px 12px 9px;
  border-radius:18px;
  border:2px solid var(--primary);
  background:var(--card);
  color:var(--primary);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  box-shadow:var(--shadow);
  transition:transform .14s ease, background .14s ease, color .14s ease, border-color .14s ease;
  font-family:'Nunito',sans-serif;
  font-weight:800;
  -webkit-tap-highlight-color:transparent;
}

.tab-btn:active{
  transform:scale(.94);
}

.tab-btn.active{
  background:var(--primary);
  color:var(--active-text);
  border-color:var(--primary);
}

.tab-icon{
  font-size:39px;
  line-height:1;
}

.tab-text{
  font-size:12px;
  line-height:1;
  letter-spacing:.2px;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.grid-wrap{
  display:flex;
  justify-content:center;
}

.grid{
  display:grid;
  gap:10px;
  width:100%;
  max-width:420px;
}

.g5,
.g4,
.g3{
  grid-template-columns:repeat(3,1fr);
}

.cell{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--card);
  border-radius:16px;
  cursor:pointer;
  padding:8px 4px 7px;
  gap:4px;
  min-height:104px;
  box-shadow:var(--shadow);
  border:1.5px solid var(--border);
  transition:transform .12s cubic-bezier(.34,1.56,.64,1), background .2s ease, color .2s ease, border-color .2s ease;
  -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',sans-serif;
}

.cell:active{
  transform:scale(.88);
}

button.cell,
button.color-cell{
  appearance:none;
  -webkit-appearance:none;
}

.tab-btn:focus-visible,
.theme-btn:focus-visible,
.cell:focus-visible,
.color-cell:focus-visible,
.moon-btn:focus-visible{
  outline:4px solid var(--soft);
  outline-offset:4px;
}

.big-num{
  font-size:26px;
  color:var(--text);
  line-height:1;
  font-weight:800;
}

.word-num{
  font-size:14px;
  color:var(--muted);
  text-align:center;
  line-height:1.05;
  font-weight:700;
}

.big-letter{
  font-size:28px;
  color:var(--text);
  line-height:1;
  font-weight:800;
}

.ani-emoji{
  font-size:33px;
  line-height:1;
}

.animal-name{
  font-size:14px;
  color:var(--muted);
  text-align:center;
  line-height:1.05;
  font-weight:700;
}

.cell.vowel-cell{
  min-height:120px;
}

.vowel-cell .big-letter{
  font-size:36px;
}

.vowel-cell .ani-emoji{
  font-size:36px;
}

.animal-emoji{
  font-size:51px;
  line-height:1;
}

.color-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
  max-width:320px;
  margin:0 auto;
  padding:10px 0 0;
}

.color-cell{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow);
  border:2px solid rgba(255,255,255,.32);
  transition:transform .12s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',sans-serif;
}

.color-cell:active{
  transform:scale(.88);
}

.c-name{
  font-size:14px;
  font-family:'Nunito',sans-serif;
  text-align:center;
  line-height:1.05;
  font-weight:800;
  padding:0 6px;
}

.overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:150;
  background:rgba(68,81,92,.52);
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(7px);
  -webkit-backdrop-filter:blur(7px);
}

.overlay.show{
  display:flex;
}

.popup{
  background:var(--card);
  border-radius:28px;
  padding:30px 24px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  animation:popIn .35s ease;
  max-width:260px;
  width:84%;
  border:2px solid var(--border);
  box-shadow:var(--shadow);
}

@keyframes popIn{
  0%{ transform:scale(.35); opacity:0; }
  100%{ transform:scale(1); opacity:1; }
}

.popup-big{
  font-size:96px;
  line-height:1;
  color:var(--text);
  font-family:'Nunito',sans-serif;
  font-weight:800;
}

.popup-icon{
  font-size:90px;
  line-height:1;
}

.popup-animal{
  font-size:150px;
  line-height:1;
}

.popup-name{
  font-size:24px;
  color:var(--primary);
  font-family:'Nunito',sans-serif;
  font-weight:800;
}

.color-flash{
  display:none;
  position:fixed;
  inset:0;
  z-index:200;
  align-items:center;
  justify-content:center;
}

.color-flash.show{
  display:flex;
}

.flash-name{
  font-size:52px;
  font-family:'Nunito',sans-serif;
  text-align:center;
  font-weight:800;
}

.sleep-screen{
  display:none;
  position:fixed;
  inset:0;
  z-index:300;
  background:#263B5A;
}

.sleep-screen.show{
  display:block;
}

.stars-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.sleep-msg{
  position:absolute;
  left:0;
  right:0;
  bottom:28px;
  text-align:center;
  font-family:'Nunito',sans-serif;
  color:#FAFAF7;
  font-size:16px;
  font-weight:800;
  opacity:.92;
  letter-spacing:.2px;
}

.moon-btn{
  position:absolute;
  top:18px;
  right:18px;
  z-index:2;
  background:none;
  border:none;
  font-size:48px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  opacity:0;
  transition:opacity .9s ease;
}

.moon-btn.show{
  opacity:1;
}

@media (max-width:390px){
  body{ padding:0 10px 18px; }
  .tabs{ gap:28px; }
  .tab-btn{ min-width:80px; min-height:82px; padding:8px 9px 7px; }
  .tab-icon{ font-size:36px; }
  .tab-text{ font-size:11px; }
  .grid{ gap:10px; }
  .cell{ min-height:98px; }
  .color-grid{ gap:28px; }
}

@media (prefers-reduced-motion:reduce){
  *,
  *::before,
  *::after{
    animation:none !important;
    transition:none !important;
    scroll-behavior:auto !important;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>🌱 Aprende Jugando</h1>

  <button class="theme-btn" id="theme-btn" type="button" onclick="toggleTheme()" aria-label="Cambiar modo de color" aria-pressed="false">
    <span class="star" aria-hidden="true">⭐</span>
    <span class="label" id="theme-label">Modo noche</span>
  </button>
</div>

<div class="tabs" role="tablist" aria-label="Secciones de aprendizaje">
  <button class="tab-btn active" id="tb-n1" type="button" role="tab" aria-selected="true" aria-controls="page-n1" onclick="goPage('n1')" aria-label="Números del 1 al 30">
    <span class="tab-icon" aria-hidden="true">1️⃣</span>
    <span class="tab-text">1-30</span>
  </button>

  <button class="tab-btn" id="tb-n2" type="button" role="tab" aria-selected="false" aria-controls="page-n2" onclick="goPage('n2')" aria-label="Números del 31 al 50">
    <span class="tab-icon" aria-hidden="true">2️⃣</span>
    <span class="tab-text">31-50</span>
  </button>

  <button class="tab-btn" id="tb-ani" type="button" role="tab" aria-selected="false" aria-controls="page-ani" onclick="goPage('ani')" aria-label="Animales">
    <span class="tab-icon" aria-hidden="true">🐾</span>
    <span class="tab-text">Animales</span>
  </button>

  <button class="tab-btn" id="tb-vow" type="button" role="tab" aria-selected="false" aria-controls="page-vow" onclick="goPage('vow')" aria-label="Vocales">
    <span class="tab-icon" aria-hidden="true">🅰️</span>
    <span class="tab-text">Vocales</span>
  </button>

  <button class="tab-btn" id="tb-abc" type="button" role="tab" aria-selected="false" aria-controls="page-abc" onclick="goPage('abc')" aria-label="Abecedario">
    <span class="tab-icon" aria-hidden="true">🔤</span>
    <span class="tab-text">Abecedario</span>
  </button>

  <button class="tab-btn" id="tb-col" type="button" role="tab" aria-selected="false" aria-controls="page-col" onclick="goPage('col')" aria-label="Colores">
    <span class="tab-icon" aria-hidden="true">🎨</span>
    <span class="tab-text">Colores</span>
  </button>

  <button class="tab-btn" id="tb-off" type="button" onclick="startSleep()" aria-label="Modo descanso">
    <span class="tab-icon" aria-hidden="true">😴</span>
    <span class="tab-text">Descanso</span>
  </button>
</div>

<div class="page active" id="page-n1" role="tabpanel" aria-labelledby="tb-n1">
  <div class="grid-wrap">
    <div class="grid g5" id="grid-n1"></div>
  </div>
</div>

<div class="page" id="page-n2" role="tabpanel" aria-labelledby="tb-n2" hidden>
  <div class="grid-wrap">
    <div class="grid g5" id="grid-n2"></div>
  </div>
</div>

<div class="page" id="page-ani" role="tabpanel" aria-labelledby="tb-ani" hidden>
  <div class="grid-wrap">
    <div class="grid g4" id="grid-ani"></div>
  </div>
</div>

<div class="page" id="page-vow" role="tabpanel" aria-labelledby="tb-vow" hidden>
  <div class="grid-wrap">
    <div class="grid g3" id="grid-vow"></div>
  </div>
</div>

<div class="page" id="page-abc" role="tabpanel" aria-labelledby="tb-abc" hidden>
  <div class="grid-wrap">
    <div class="grid g5" id="grid-abc"></div>
  </div>
</div>

<div class="page" id="page-col" role="tabpanel" aria-labelledby="tb-col" hidden>
  <div class="color-grid" id="grid-col"></div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-live="polite" tabindex="-1" aria-labelledby="popup-name">
  <div class="popup">
    <div id="popup-content"></div>
    <div class="popup-name" id="popup-name"></div>
  </div>
</div>

<div class="color-flash" id="color-flash" aria-live="polite">
  <div class="flash-name" id="flash-name"></div>
</div>

<div class="sleep-screen" id="sleep-screen">
  <canvas class="stars-canvas" id="stars-canvas" aria-hidden="true"></canvas>
  <div class="sleep-msg">Buen descanso 🌙</div>
  <button class="moon-btn" id="moon-btn" type="button" onclick="wakeUp()" aria-label="Volver">
    🌙
  </button>
</div>

<script>
const numWords = [
  '',
  'Uno','Dos','Tres','Cuatro','Cinco','Seis','Siete','Ocho','Nueve','Diez',
  'Once','Doce','Trece','Catorce','Quince','Dieciséis','Diecisiete','Dieciocho','Diecinueve','Veinte',
  'Veintiuno','Veintidós','Veintitrés','Veinticuatro','Veinticinco','Veintiséis','Veintisiete','Veintiocho','Veintinueve','Treinta',
  'Treinta y uno','Treinta y dos','Treinta y tres','Treinta y cuatro','Treinta y cinco',
  'Treinta y seis','Treinta y siete','Treinta y ocho','Treinta y nueve','Cuarenta',
  'Cuarenta y uno','Cuarenta y dos','Cuarenta y tres','Cuarenta y cuatro','Cuarenta y cinco',
  'Cuarenta y seis','Cuarenta y siete','Cuarenta y ocho','Cuarenta y nueve','Cincuenta'
];

const animals = [
  {name:'Perro',e:'🐶'},{name:'Gato',e:'🐱'},{name:'Gallina',e:'🐔'},
  {name:'Vaca',e:'🐮'},{name:'Caballo',e:'🐴'},{name:'Burro',e:'🫏'},
  {name:'Llama',e:'🦙'},{name:'Alpaca',e:'🐑'},{name:'Cuy',e:'🐹'},
  {name:'Loro',e:'🦜'},{name:'Mono',e:'🐒'},{name:'Cóndor',e:'🦅'},
  {name:'Caimán',e:'🐊'},{name:'Tucán',e:'🐦'},{name:'Oso',e:'🐻'},
  {name:'Delfín',e:'🐬'},{name:'Hormiga',e:'🐜'},{name:'Mariposa',e:'🦋'},
  {name:'Abeja',e:'🐝'},{name:'León',e:'🦁'},{name:'Elefante',e:'🐘'},
  {name:'Pingüino',e:'🐧'},{name:'Colibrí',e:'🕊️'},{name:'Iguana',e:'🦎'},
  {name:'Tiburón',e:'🦈'},{name:'Vicuña',e:'🦌'},{name:'Tortuga',e:'🐢'},
  {name:'Rana',e:'🐸'},{name:'Pato',e:'🦆'},{name:'Pez',e:'🐟'}
];

const vowels = [
  {l:'A',e:'🦅',word:'Águila'},
  {l:'E',e:'🐘',word:'Elefante'},
  {l:'I',e:'🦎',word:'Iguana'},
  {l:'O',e:'🐻',word:'Oso'},
  {l:'U',e:'🍇',word:'Uva'}
];

const abcData = [
  {l:'A',e:'🦅'},{l:'B',e:'🐋'},{l:'C',e:'🐊'},{l:'D',e:'🐬'},{l:'E',e:'🐘'},
  {l:'F',e:'🦩'},{l:'G',e:'🦍'},{l:'H',e:'🦛'},{l:'I',e:'🦎'},{l:'J',e:'🐆'},
  {l:'L',e:'🦁'},{l:'M',e:'🐒'},{l:'N',e:'🦋'},{l:'Ñ',e:'🐦'},{l:'O',e:'🐻'},
  {l:'P',e:'🦜'},{l:'Q',e:'🐐'},{l:'R',e:'🐸'},{l:'S',e:'🐍'},{l:'T',e:'🐢'},
  {l:'U',e:'🦄'},{l:'V',e:'🦊'},{l:'W',e:'🐺'},{l:'X',e:'🦀'},{l:'Y',e:'🦌'},
  {l:'Z',e:'🦓'}
];

const colors = [
  {name:'Rojo',hex:'#FF0000',tc:'#FFFFFF'},
  {name:'Azul',hex:'#0066FF',tc:'#FFFFFF'},
  {name:'Amarillo',hex:'#FFD700',tc:'#222222'},
  {name:'Verde',hex:'#00AA00',tc:'#FFFFFF'},
  {name:'Naranja',hex:'#FF7A00',tc:'#222222'},
  {name:'Morado',hex:'#8000FF',tc:'#FFFFFF'},
  {name:'Rosa',hex:'#FF4FA3',tc:'#222222'},
  {name:'Marrón',hex:'#8B4513',tc:'#FFFFFF'},
  {name:'Negro',hex:'#000000',tc:'#FFFFFF'},
  {name:'Blanco',hex:'#FFFFFF',tc:'#222222'},
  {name:'Celeste',hex:'#00BFFF',tc:'#222222'},
  {name:'Gris',hex:'#808080',tc:'#FFFFFF'}
];

let popTimer = null;
let closeTimer = null;
let sleepAnim = null;

function goPage(id){
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.hidden = true;
  });
  document.querySelectorAll('.tab-btn[role="tab"]').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
  });

  const page = document.getElementById('page-'+id);
  const tab = document.getElementById('tb-'+id);
  page.classList.add('active');
  page.hidden = false;
  tab.classList.add('active');
  tab.setAttribute('aria-selected', 'true');
}

function buildNums(gridId, from, to){
  const g = document.getElementById(gridId);
  let html = '';
  for(let i=from;i<=to;i++){
    html += `
      <button class="cell" type="button" onclick="pickNum(${i})" aria-label="Número ${i}, ${numWords[i]}">
        <span class="big-num" aria-hidden="true">${i}</span>
        <span class="word-num">${numWords[i]}</span>
      </button>
    `;
  }
  g.innerHTML = html;
}

function buildAnimals(){
  const g = document.getElementById('grid-ani');
  let html = '';
  animals.forEach((a, i) => {
    html += `
      <button class="cell" type="button" onclick="pickAnimal(${i})" aria-label="Animal: ${a.name}">
        <span class="animal-emoji" aria-hidden="true">${a.e}</span>
        <span class="animal-name">${a.name}</span>
      </button>
    `;
  });
  g.innerHTML = html;
}

function buildVowels(){
  const g = document.getElementById('grid-vow');
  let html = '';
  vowels.forEach((v, i) => {
    html += `
      <button class="cell vowel-cell" type="button" onclick="pickVowel(${i})" aria-label="Vocal ${v.l}, ${v.word}">
        <span class="big-letter" aria-hidden="true">${v.l}</span>
        <span class="ani-emoji" aria-hidden="true">${v.e}</span>
        <span class="animal-name">${v.word}</span>
      </button>
    `;
  });
  g.innerHTML = html;
}

function buildAbc(){
  const g = document.getElementById('grid-abc');
  let html = '';
  abcData.forEach((v, i) => {
    html += `
      <button class="cell" type="button" onclick="pickLetter(${i})" aria-label="Letra ${v.l}">
        <span class="big-letter" aria-hidden="true">${v.l}</span>
        <span class="ani-emoji" aria-hidden="true">${v.e}</span>
      </button>
    `;
  });
  g.innerHTML = html;
}

function buildColors(){
  const g = document.getElementById('grid-col');
  let html = '';
  colors.forEach((c, i) => {
    html += `
      <button class="color-cell" type="button" style="background:${c.hex}" onclick="pickColor(${i})" aria-label="Color ${c.name}">
        <span class="c-name" style="color:${c.tc}">${c.name}</span>
      </button>
    `;
  });
  g.innerHTML = html;
}

function showPopup(contentHTML, name){
  clearTimeout(popTimer);
  clearTimeout(closeTimer);

  popTimer = setTimeout(() => {
    const overlay = document.getElementById('overlay');
    document.getElementById('popup-content').innerHTML = contentHTML;
    document.getElementById('popup-name').textContent = name || '';
    overlay.classList.add('show');
    overlay.focus();

    closeTimer = setTimeout(() => {
      overlay.classList.remove('show');
    }, 2600);
  }, 250);
}

function pickNum(n){
  showPopup(`<div class="popup-big">${n}</div>`, numWords[n]);
}

function pickAnimal(i){
  const a = animals[i];
  showPopup(`<div class="popup-animal">${a.e}</div>`, a.name);
}

function pickVowel(i){
  const v = vowels[i];
  showPopup(
    `<div class="popup-big">${v.l}</div><div class="popup-icon">${v.e}</div>`,
    v.word
  );
}

function pickLetter(i){
  const v = abcData[i];
  showPopup(
    `<div class="popup-big">${v.l}</div><div class="popup-icon">${v.e}</div>`,
    ''
  );
}

function pickColor(i){
  const c = colors[i];
  clearTimeout(popTimer);
  clearTimeout(closeTimer);

  popTimer = setTimeout(() => {
    const fl = document.getElementById('color-flash');
    fl.style.background = c.hex;
    document.getElementById('flash-name').style.color = c.tc;
    document.getElementById('flash-name').textContent = c.name;
    fl.classList.add('show');

    closeTimer = setTimeout(() => {
      fl.classList.remove('show');
    }, 2000);
  }, 180);
}

function applyTheme(isDark){
  document.body.classList.toggle('dark', isDark);
  document.getElementById('theme-label').textContent = isDark ? 'Modo claro' : 'Modo noche';
  document.getElementById('theme-btn').setAttribute('aria-pressed', String(isDark));
  try{
    localStorage.setItem('aprendeTema', isDark ? 'dark' : 'light');
  }catch(error){
    // El modo visual sigue funcionando aunque el navegador bloquee localStorage.
  }
}

function toggleTheme(){
  applyTheme(!document.body.classList.contains('dark'));
}

function startSleep(){
  const ss = document.getElementById('sleep-screen');
  ss.classList.add('show');

  const canvas = document.getElementById('stars-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  let stars = [];
  for(let i=0;i<90;i++){
    stars.push(makeStar(canvas));
  }

  function makeStar(c, fromTop=false){
    return {
      x: Math.random()*c.width,
      y: fromTop ? -10 : Math.random()*c.height,
      r: Math.random()*1.7 + 0.35,
      speed: Math.random()*0.35 + 0.12,
      a: Math.random()*0.35 + 0.08,
      maxA: Math.random()*0.32 + 0.12,
      pulse: Math.random()*0.0025 + 0.0008,
      dir: 1
    };
  }

  function draw(){
    if(!ss.classList.contains('show')) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(s => {
      s.y += s.speed;
      s.a += s.pulse * s.dir;

      if(s.a >= s.maxA || s.a <= 0.05) s.dir *= -1;

      if(s.y > canvas.height + 12){
        const ns = makeStar(canvas, true);
        s.x = ns.x;
        s.y = ns.y;
        s.r = ns.r;
        s.speed = ns.speed;
        s.a = ns.a;
        s.maxA = ns.maxA;
        s.pulse = ns.pulse;
        s.dir = ns.dir;
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(220,235,255,' + s.a.toFixed(3) + ')';
      ctx.fill();
    });

    sleepAnim = requestAnimationFrame(draw);
  }

  draw();

  setTimeout(() => {
    document.getElementById('moon-btn').classList.add('show');
  }, 1000);
}

function wakeUp(){
  const ss = document.getElementById('sleep-screen');
  ss.classList.remove('show');
  document.getElementById('moon-btn').classList.remove('show');
  if(sleepAnim) cancelAnimationFrame(sleepAnim);
}
